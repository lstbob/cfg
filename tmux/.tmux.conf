set -g mouse on
set -g mode-keys vi

# True color (24-bit) passthrough so Neovim/rose-pine renders its full palette
# instead of being downsampled to 256 colors. ',*:RGB' applies to any outer terminal.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# copy-mode yank -> system clipboard (OS-aware: clip.exe on WSL, xclip on Linux)
if-shell 'grep -qi microsoft /proc/version' \
  'bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "clip.exe"; bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"; bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"' \
  'bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"; bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"; bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"'

# Remap prefix from Ctrl+b to Alt+Space
unbind C-b
set -g prefix M-Space
bind M-Space send-prefix

setw -g pane-base-index 1
set -g base-index 1

set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# tmux-resurrect: persist/restore tmux sessions across reboots
run-shell ~/.local/share/tmux/plugins/tmux-resurrect/resurrect.tmux

# rose-pine theme (options must come before the run-shell that reads them)
set -g @rose_pine_variant 'main'                   # main | moon | dawn
set -g @rose_pine_bar_bg_disable 'on'              # transparent status bar
set -g @rose_pine_bar_bg_disabled_color_option 'default'

run-shell ~/.local/share/tmux/plugins/tmux-rose-pine/rose-pine.tmux