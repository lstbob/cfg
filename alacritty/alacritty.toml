[general]
import = ["~/.config/alacritty/themes/themes/gruvbox_dark.toml"]

[cursor]
style = { shape = "Block", blinking = "Always" }

[window]
startup_mode = "Fullscreen"
opacity = 0.85

[keyboard]
bindings = [
  { key = "F11", action = "ToggleFullscreen" },
  { key = "F10", action = "Minimize" },
  { key = "Comma", mods = "Control", command = { program = "bash", args = ["-c", "tmux new-window 'vim ~/.config/alacritty/alacritty.toml'"] } },
  { key = "Period", mods = "Control", command = { program = "bash", args = ["-c", "tmux new-window 'vim ~/.tmux.conf'"] } },
]
