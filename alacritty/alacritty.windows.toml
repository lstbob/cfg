[general]
# rose-pine (dark/main) — pair with nvim :set background=dark
import = ["~\\AppData\\Roaming\\alacritty\\themes\\themes\\rose_pine.toml"]

# rose-pine dawn (light) — pair with nvim :set background=light
#import = ["~\\AppData\\Roaming\\alacritty\\themes\\themes\\rose_pine_dawn.toml"]

# previous github themes:
#import = ["~\\AppData\\Roaming\\alacritty\\themes\\themes\\github_dark_high_contrast.toml"]
#import = ["~\\AppData\\Roaming\\alacritty\\themes\\themes\\github_dark_light_contrast.toml"]

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 300

[window]
startup_mode = "Fullscreen"


[keyboard]
bindings = [
  { key = "F11", action = "ToggleFullscreen" },
  { key = "F10", action = "Minimize" },
  { key = "T", mods = "Control", action = "ReceiveChar" },
  #tmux bindings for configuring
  #shouldn't be part of tmux config as not to confuse session bindings
  { key = "Comma",  mods = "Control", command = { program = "wsl", args = ["-d", "debian", "--", "bash", "-lc", "tmux new-window 'nvim /mnt/c/Users/bobchevl/AppData/Roaming/alacritty/alacritty.toml'"] } },
  { key = "Period", mods = "Control", command = { program = "wsl", args = ["-d", "debian", "--", "bash", "-lc", "tmux new-window 'nvim ~/.tmux.conf'"] } },
  { key = "Home",   mods = "Control", command = { program = "wsl", args = ["-d", "debian", "--", "bash", "-lc", "tmux send-keys 'cd ~' Enter"] } },
  { key = "End",    mods = "Control", command = { program = "wsl", args = ["-d", "debian", "--", "bash", "-lc", "tmux send-keys 'cd /' Enter"] } },
  { key = "Slash",  mods = "Control", command = { program = "wsl", args = ["-d", "debian", "--", "bash", "-lc", "tmux new-window 'nvim ~/.bashrc'"] } },
  # unified rose-pine light/dark toggle (Neovim + tmux + Alacritty)
  { key = "B", mods = "Control|Shift", command = { program = "wsl", args = ["-d", "debian", "--", "bash", "-lc", "/home/blyuben/.local/bin/rose-pine-toggle.sh"] } },
]
